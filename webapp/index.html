<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Reminders</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="phone-frame">
        <!-- Статус-бар -->
        <div class="status-bar">
            <span class="status-time">9:41</span>
            <div class="status-icons">
                <svg width="15" height="11" viewBox="0 0 15 11"><rect x="0" y="6" width="2" height="5" rx="0.5" fill="white"/><rect x="3" y="4" width="2" height="7" rx="0.5" fill="white"/><rect x="6" y="2" width="2" height="9" rx="0.5" fill="white"/><rect x="9" y="0" width="2" height="11" rx="0.5" fill="white"/></svg>
                <svg width="15" height="11" viewBox="0 0 15 11"><rect x="0" y="5" width="11" height="6" rx="1" fill="none" stroke="white" stroke-width="1"/><rect x="12" y="6.5" width="1.5" height="2.5" rx="0.5" fill="white"/></svg>
                <svg width="24" height="11" viewBox="0 0 24 11"><rect x="0" y="0" width="19" height="11" rx="3" fill="none" stroke="white" stroke-width="1"/><rect x="21" y="3" width="1.5" height="5" rx="0.5" fill="white"/><rect x="2" y="2" width="12" height="7" rx="1.5" fill="white" opacity="0.4"/></svg>
            </div>
        </div>

        <!-- Контент -->
        <div class="content">
            <!-- Заголовок -->
            <div class="header-section">
                <h1 class="title">Reminders</h1>
                <p class="subtitle">Stay organized</p>
            </div>

            <!-- Центральный круг -->
            <div class="hero-circle-container">
                <div class="hero-circle">
                    <div class="hero-circle-glow"></div>
                    <div class="hero-circle-content">
                        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12 6 12 12 16 14"/>
                        </svg>
                        <span class="hero-number">4</span>
                        <span class="hero-label">active</span>
                    </div>
                </div>
            </div>

            <!-- Индикаторы -->
            <div class="rings-row">
                <div class="ring-item">
                    <svg viewBox="0 0 44 44"><circle cx="22" cy="22" r="18" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/><circle cx="22" cy="22" r="18" fill="none" stroke="#7c5ce7" stroke-width="4" stroke-dasharray="80 20" stroke-linecap="round" transform="rotate(-90 22 22)"/></svg>
                </div>
                <div class="ring-item">
                    <svg viewBox="0 0 44 44"><circle cx="22" cy="22" r="18" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/><circle cx="22" cy="22" r="18" fill="none" stroke="#f97316" stroke-width="4" stroke-dasharray="50 50" stroke-linecap="round" transform="rotate(-90 22 22)"/></svg>
                </div>
                <div class="ring-item">
                    <svg viewBox="0 0 44 44"><circle cx="22" cy="22" r="18" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/><circle cx="22" cy="22" r="18" fill="none" stroke="#4A90D9" stroke-width="4" stroke-dasharray="65 35" stroke-linecap="round" transform="rotate(-90 22 22)"/></svg>
                </div>
                <div class="ring-item">
                    <svg viewBox="0 0 44 44"><circle cx="22" cy="22" r="18" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/><circle cx="22" cy="22" r="18" fill="none" stroke="#2ecc71" stroke-width="4" stroke-dasharray="90 10" stroke-linecap="round" transform="rotate(-90 22 22)"/></svg>
                </div>
                <div class="ring-item">
                    <svg viewBox="0 0 44 44"><circle cx="22" cy="22" r="18" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/><circle cx="22" cy="22" r="18" fill="none" stroke="#e74c3c" stroke-width="4" stroke-dasharray="25 75" stroke-linecap="round" transform="rotate(-90 22 22)"/></svg>
                </div>
            </div>

            <!-- Карточка приглашения -->
            <div class="invite-card">
                <div class="invite-card-shine"></div>
                <div class="invite-card-body">
                    <div class="invite-card-left">
                        <div class="invite-card-icon">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </div>
                        <div>
                            <div class="invite-card-title">New Reminder</div>
                            <div class="invite-card-sub">Set time, repeat & folder</div>
                        </div>
                    </div>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                </div>
            </div>

            <!-- Секция задач -->
            <div class="tasks-section">
                <div class="tasks-header">
                    <span class="tasks-title">Today</span>
                    <span class="tasks-badge">3</span>
                </div>
                <div class="tasks-list">
                    <div class="task-row">
                        <div class="task-row-icon" style="background: rgba(124,92,231,0.2);">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7c5ce7" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/></svg>
                        </div>
                        <div class="task-row-info">
                            <span class="task-row-name">Design review</span>
                            <span class="task-row-meta">14:30 · Work</span>
                        </div>
                        <div class="task-row-check"></div>
                    </div>
                    <div class="task-row overdue">
                        <div class="task-row-icon" style="background: rgba(249,115,22,0.2);">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
                        </div>
                        <div class="task-row-info">
                            <span class="task-row-name">Weekly report</span>
                            <span class="task-row-meta overdue-text">Overdue · Work</span>
                        </div>
                        <div class="task-row-check"></div>
                    </div>
                    <div class="task-row">
                        <div class="task-row-icon" style="background: rgba(46,204,113,0.2);">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2ecc71" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        </div>
                        <div class="task-row-info">
                            <span class="task-row-name">Team standup</span>
                            <span class="task-row-meta">16:00 · Work</span>
                        </div>
                        <div class="task-row-check"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Таб-бар -->
        <div class="tab-bar">
            <div class="tab-item active">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                <span>Home</span>
            </div>
            <div class="tab-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                <span>Tasks</span>
            </div>
            <div class="tab-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>
                <span>Calendar</span>
            </div>
            <div class="tab-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                <span>Folders</span>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
