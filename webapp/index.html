<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Reminder</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Фоновый звёздный узор -->
    <div class="stars-bg"></div>

    <div class="app-container">
        <!-- Верхняя системная панель -->
        <header class="status-bar">
            <span class="time">9:41</span>
            <div class="status-icons">
                <svg width="16" height="11" viewBox="0 0 16 11"><rect x="0" y="6" width="2" height="5" rx="0.5" fill="white" opacity="0.9"/><rect x="3" y="4" width="2" height="7" rx="0.5" fill="white" opacity="0.9"/><rect x="6" y="2" width="2" height="9" rx="0.5" fill="white" opacity="0.9"/><rect x="9" y="0" width="2" height="11" rx="0.5" fill="white" opacity="0.9"/></svg>
                <svg width="16" height="11" viewBox="0 0 16 11"><rect x="0" y="5" width="12" height="6" rx="1" fill="none" stroke="white" stroke-width="1" opacity="0.9"/><rect x="13" y="6.5" width="2" height="3" rx="0.5" fill="white" opacity="0.9"/></svg>
                <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="0" width="21" height="12" rx="3" fill="none" stroke="white" stroke-width="1" opacity="0.9"/><rect x="23" y="3.5" width="1.5" height="5" rx="0.5" fill="white" opacity="0.9"/><rect x="2" y="2" width="14" height="8" rx="1.5" fill="white" opacity="0.5"/></svg>
            </div>
        </header>

        <!-- Основной контент -->
        <main class="content">
            <!-- Центральный круг-якорь -->
            <div class="hero-circle-wrapper">
                <div class="hero-circle">
                    <div class="hero-circle-inner">
                        <div class="hero-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
                                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                            </svg>
                        </div>
                        <div class="hero-label">Reminders</div>
                        <div class="hero-count">4 active</div>
                    </div>
                </div>
            </div>

            <!-- Индикаторы статусов -->
            <div class="status-indicators">
                <div class="indicator" style="--fill: 75%; --color: #7c5ce7;">
                    <svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="4"/><circle cx="20" cy="20" r="16" fill="none" stroke="var(--color)" stroke-width="4" stroke-dasharray="75 25" stroke-linecap="round" transform="rotate(-90 20 20)"/></svg>
                </div>
                <div class="indicator" style="--fill: 40%; --color: #f97316;">
                    <svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="4"/><circle cx="20" cy="20" r="16" fill="none" stroke="var(--color)" stroke-width="4" stroke-dasharray="40 60" stroke-linecap="round" transform="rotate(-90 20 20)"/></svg>
                </div>
                <div class="indicator" style="--fill: 90%; --color: #2ecc71;">
                    <svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="4"/><circle cx="20" cy="20" r="16" fill="none" stroke="var(--color)" stroke-width="4" stroke-dasharray="90 10" stroke-linecap="round" transform="rotate(-90 20 20)"/></svg>
                </div>
                <div class="indicator" style="--fill: 55%; --color: #4A90D9;">
                    <svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="4"/><circle cx="20" cy="20" r="16" fill="none" stroke="var(--color)" stroke-width="4" stroke-dasharray="55 45" stroke-linecap="round" transform="rotate(-90 20 20)"/></svg>
                </div>
                <div class="indicator" style="--fill: 20%; --color: #e74c3c;">
                    <svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="4"/><circle cx="20" cy="20" r="16" fill="none" stroke="var(--color)" stroke-width="4" stroke-dasharray="20 80" stroke-linecap="round" transform="rotate(-90 20 20)"/></svg>
                </div>
            </div>

            <!-- Карточка-приглашение -->
            <div class="cta-card" id="ctaCard">
                <div class="cta-shine"></div>
                <div class="cta-content">
                    <div class="cta-text">
                        <div class="cta-title">Create new reminder</div>
                        <div class="cta-sub">Set time, repeat & folder</div>
                    </div>
                    <div class="cta-arrow">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 18 15 12 9 6"/></svg>
                    </div>
                </div>
            </div>

            <!-- Секция Daily Tasks -->
            <div class="section">
                <div class="section-header">
                    <span class="section-title">Daily Tasks</span>
                    <span class="section-count">3</span>
                </div>
                <div class="task-cards" id="taskCards">
                    <div class="task-card">
                        <div class="task-icon" style="--icon-bg: rgba(124,92,231,0.2); --icon-color: #7c5ce7;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="12" y2="17"/></svg>
                        </div>
                        <div class="task-info">
                            <div class="task-name">Design review</div>
                            <div class="task-time">14:30 · Work</div>
                        </div>
                        <button class="task-check-btn">
                            <div class="check-circle"></div>
                        </button>
                    </div>
                    <div class="task-card overdue">
                        <div class="task-icon" style="--icon-bg: rgba(249,115,22,0.2); --icon-color: #f97316;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        </div>
                        <div class="task-info">
                            <div class="task-name">Send weekly report</div>
                            <div class="task-time overdue-text">Overdue · Work</div>
                        </div>
                        <button class="task-check-btn">
                            <div class="check-circle"></div>
                        </button>
                    </div>
                    <div class="task-card">
                        <div class="task-icon" style="--icon-bg: rgba(46,204,113,0.2); --icon-color: #2ecc71;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        </div>
                        <div class="task-info">
                            <div class="task-name">Team standup</div>
                            <div class="task-time">16:00 · Work</div>
                        </div>
                        <button class="task-check-btn">
                            <div class="check-circle"></div>
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Нижняя навигационная панель -->
        <nav class="bottom-nav">
            <div class="nav-item active">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                <span>Home</span>
            </div>
            <div class="nav-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                <span>Tasks</span>
            </div>
            <div class="nav-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span>Calendar</span>
            </div>
            <div class="nav-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                <span>Folders</span>
            </div>
        </nav>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
