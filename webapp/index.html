<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Reminders</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="app">
        <!-- Home -->
        <div class="screen active" id="screen-home">
            <div class="topbar">
                <h1 data-i18n="reminders">Reminders</h1>
                <div class="topbar-actions">
                    <button class="lang-btn" id="langBtn">EN</button>
                    <button class="add-btn" id="addHomeBtn">+</button>
                </div>
            </div>

            <div class="hero">
                <div class="hero-ring">
                    <div class="hero-ring-inner">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        <span class="hero-num" id="activeCount">4</span>
                        <span class="hero-sub" data-i18n="active">active</span>
                    </div>
                </div>
            </div>

            <div class="cards">
                <div class="card overdue" id="cardOverdue">
                    <div class="card-icon" style="background:rgba(249,115,22,0.2)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
                    <div><b data-i18n="overdue">Overdue</b><small id="overdueCount">2 tasks</small></div>
                </div>
                <div class="card" id="cardToday">
                    <div class="card-icon" style="background:rgba(74,144,217,0.2)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4A90D9" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg></div>
                    <div><b data-i18n="today">Today</b><small id="todayCount">3 tasks</small></div>
                </div>
                <div class="card" id="cardUpcoming">
                    <div class="card-icon" style="background:rgba(46,204,113,0.2)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2ecc71" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/></svg></div>
                    <div><b data-i18n="upcoming">Upcoming</b><small id="upcomingCount">5 tasks</small></div>
                </div>
            </div>
        </div>

        <!-- Tasks -->
        <div class="screen" id="screen-tasks">
            <div class="topbar">
                <h1 data-i18n="tasks">Tasks</h1>
                <div class="topbar-actions">
                    <button class="lang-btn" id="langBtnTasks">EN</button>
                    <button class="add-btn" id="addTaskBtn">+</button>
                </div>
            </div>
            <div class="search-box">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" data-i18n="search" placeholder="Search tasks..." id="searchInput">
            </div>
            <div class="chips">
                <span class="chip on" data-filter="all" data-i18n="all">All</span>
                <span class="chip" data-filter="today" data-i18n="today">Today</span>
                <span class="chip" data-filter="week" data-i18n="week">Week</span>
                <span class="chip" data-filter="overdue" data-i18n="overdue">Overdue</span>
            </div>
            <div class="list" id="taskList"></div>
        </div>

        <!-- Calendar -->
        <div class="screen" id="screen-calendar">
            <div class="topbar">
                <h1 data-i18n="calendar">Calendar</h1>
                <div class="topbar-actions">
                    <button class="lang-btn" id="langBtnCalendar">EN</button>
                    <button class="add-btn" id="addCalBtn">+</button>
                </div>
            </div>
            <div class="cal-nav">
                <button id="prevMonth">&lt;</button>
                <span id="monthTitle">July 2026</span>
                <button id="nextMonth">&gt;</button>
            </div>
            <div class="cal-weekdays"><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span></div>
            <div class="cal-grid" id="calGrid"></div>
            <div id="calTasks"></div>
        </div>

        <!-- Settings -->
        <div class="screen" id="screen-settings">
            <div class="topbar">
                <h1 data-i18n="settings">Settings</h1>
                <div class="topbar-actions">
                    <button class="lang-btn" id="langBtnSettings">EN</button>
                </div>
            </div>
            <div class="section-title" data-i18n="folders">Folders</div>
            <div class="list" id="settingsFolderList"></div>
            <button class="add-folder-btn" id="addFolderSettingsBtn" data-i18n="addFolder">+ Add folder</button>
        </div>

        <!-- Tab bar -->
        <div class="tabs">
            <div class="tab on" data-screen="home">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                <span data-i18n="home">Home</span>
            </div>
            <div class="tab" data-screen="tasks">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/></svg>
                <span data-i18n="tasks">Tasks</span>
            </div>
            <div class="tab" data-screen="calendar">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/></svg>
                <span data-i18n="calendar">Calendar</span>
            </div>
            <div class="tab" data-screen="settings">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                <span data-i18n="settings">Settings</span>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-box">
            <h3 id="modalTitle" data-i18n="newReminder">New Reminder</h3>

            <input type="text" class="field" id="inpTitle" data-i18n="taskName" placeholder="Task name">
            <textarea class="field" id="inpDesc" data-i18n="notes" placeholder="Notes" rows="2"></textarea>

            <label data-i18n="deadline">Deadline</label>
            <input type="datetime-local" class="field" id="inpDeadline">

            <label data-i18n="priority">Priority</label>
            <div class="prio" id="prioSelect">
                <span class="prio-btn" data-p="low">!</span>
                <span class="prio-btn on" data-p="medium">!!</span>
                <span class="prio-btn" data-p="high">!!!</span>
            </div>

            <label data-i18n="folder">Folder</label>
            <select class="field" id="inpFolder">
                <option value="" data-i18n="none">None</option>
            </select>

            <label data-i18n="repeat">Repeat</label>
            <select class="field" id="inpRepeat">
                <option value="none" data-i18n="never">Never</option>
                <option value="daily" data-i18n="daily">Daily</option>
                <option value="weekly" data-i18n="weekly">Weekly</option>
                <option value="monthly" data-i18n="monthly">Monthly</option>
            </select>

            <label data-i18n="remindBefore">Remind before</label>
            <select class="field" id="inpRemind">
                <option value="0" data-i18n="atDeadline">At deadline</option>
                <option value="5" data-i18n="min5">5 minutes</option>
                <option value="15" data-i18n="min15">15 minutes</option>
                <option value="30" data-i18n="min30">30 minutes</option>
                <option value="60" data-i18n="hour1">1 hour</option>
                <option value="1440" data-i18n="day1">1 day</option>
            </select>

            <label data-i18n="customReminders">Custom reminders</label>
            <div id="customRemindersList"></div>
            <button class="add-sub-btn" id="addCustomReminderBtn" data-i18n="addReminder">+ Add reminder time</button>

            <div class="modal-btns">
                <button class="del-btn" id="delBtn" style="display:none" data-i18n="delete">Delete</button>
                <button class="save-btn" id="saveBtn" data-i18n="save">Save</button>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
