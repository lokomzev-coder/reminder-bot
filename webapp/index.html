<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Reminders</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="phone-frame">
        <!-- Контент -->
        <div class="content" id="content">
            <!-- Home -->
            <div class="page active" id="page-home">
                <div class="page-header">
                    <h1 class="page-title" data-i18n="reminders">Reminders</h1>
                    <div class="header-actions">
                        <button class="lang-toggle" id="langToggle">EN</button>
                        <button class="btn-circle" id="btnAddHome">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                    </div>
                </div>

                <div class="hero-circle-container">
                    <div class="hero-circle">
                        <div class="hero-circle-glow"></div>
                        <div class="hero-circle-content">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            <span class="hero-number" id="activeCount">4</span>
                            <span class="hero-label" data-i18n="active">active</span>
                        </div>
                    </div>
                </div>

                <div class="smart-lists">
                    <div class="smart-list-card overdue-card">
                        <div class="smart-list-left">
                            <div class="smart-list-icon" style="background: rgba(249,115,22,0.2);">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                            </div>
                            <div>
                                <span class="smart-list-name" data-i18n="overdue">Overdue</span>
                                <span class="smart-list-count" id="overdueCount">2 tasks</span>
                            </div>
                        </div>
                    </div>
                    <div class="smart-list-card">
                        <div class="smart-list-left">
                            <div class="smart-list-icon" style="background: rgba(74,144,217,0.2);">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4A90D9" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>
                            </div>
                            <div>
                                <span class="smart-list-name" data-i18n="today">Today</span>
                                <span class="smart-list-count" id="todayCount">3 tasks</span>
                            </div>
                        </div>
                    </div>
                    <div class="smart-list-card">
                        <div class="smart-list-left">
                            <div class="smart-list-icon" style="background: rgba(46,204,113,0.2);">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2ecc71" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
                            </div>
                            <div>
                                <span class="smart-list-name" data-i18n="upcoming">Upcoming</span>
                                <span class="smart-list-count" id="upcomingCount">5 tasks</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tasks -->
            <div class="page" id="page-tasks">
                <div class="page-header">
                    <h1 class="page-title" data-i18n="tasks">Tasks</h1>
                    <div class="header-actions">
                        <button class="lang-toggle" id="langToggleTasks">EN</button>
                        <button class="btn-circle" id="btnAddTask">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                    </div>
                </div>
                <div class="search-bar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" data-i18n="search" placeholder="Search tasks..." class="search-input" id="searchTasks">
                </div>
                <div class="filter-chips">
                    <button class="chip active" data-filter="all" data-i18n="all">All</button>
                    <button class="chip" data-filter="today" data-i18n="today">Today</button>
                    <button class="chip" data-filter="week" data-i18n="week">Week</button>
                    <button class="chip" data-filter="overdue" data-i18n="overdue">Overdue</button>
                </div>
                <div class="tasks-list-scroll" id="allTasksList"></div>
            </div>

            <!-- Calendar -->
            <div class="page" id="page-calendar">
                <div class="page-header">
                    <h1 class="page-title" data-i18n="calendar">Calendar</h1>
                    <div class="header-actions">
                        <button class="lang-toggle" id="langToggleCalendar">EN</button>
                        <button class="btn-circle" id="btnAddCalendar">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                    </div>
                </div>
                <div class="month-nav">
                    <button class="month-arrow" id="prevMonth"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
                    <span class="month-title" id="monthTitle">July 2026</span>
                    <button class="month-arrow" id="nextMonth"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
                </div>
                <div class="weekdays">
                    <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
                <div class="selected-date-tasks" id="selectedDateTasks">
                    <p class="no-tasks-text" data-i18n="selectDate">Select a date to see tasks</p>
                </div>
            </div>

            <!-- Folders -->
            <div class="page" id="page-folders">
                <div class="page-header">
                    <h1 class="page-title" data-i18n="folders">Folders</h1>
                    <div class="header-actions">
                        <button class="lang-toggle" id="langToggleFolders">EN</button>
                        <button class="btn-circle" id="btnAddFolder">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                    </div>
                </div>
                <div class="folders-list" id="foldersList">
                    <div class="folder-card">
                        <div class="folder-left">
                            <div class="folder-color" style="background: #7c5ce7;"></div>
                            <span class="folder-name" data-i18n="work">Work</span>
                        </div>
                        <span class="folder-count">5</span>
                    </div>
                    <div class="folder-card">
                        <div class="folder-left">
                            <div class="folder-color" style="background: #2ecc71;"></div>
                            <span class="folder-name" data-i18n="personal">Personal</span>
                        </div>
                        <span class="folder-count">3</span>
                    </div>
                    <div class="folder-card">
                        <div class="folder-left">
                            <div class="folder-color" style="background: #4A90D9;"></div>
                            <span class="folder-name" data-i18n="study">Study</span>
                        </div>
                        <span class="folder-count">2</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Таб-бар -->
        <div class="tab-bar">
            <div class="tab-item active" data-page="home">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                <span data-i18n="home">Home</span>
            </div>
            <div class="tab-item" data-page="tasks">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                <span data-i18n="tasks">Tasks</span>
            </div>
            <div class="tab-item" data-page="calendar">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>
                <span data-i18n="calendar">Calendar</span>
            </div>
            <div class="tab-item" data-page="folders">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                <span data-i18n="folders">Folders</span>
            </div>
        </div>
    </div>

    <!-- Модальное окно -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-sheet">
            <div class="modal-handle"></div>
            <h3 class="modal-title" id="modalTitle" data-i18n="newReminder">New Reminder</h3>
            <div class="modal-body">
                <input type="text" class="modal-input" id="inputTitle" data-i18n="taskName" placeholder="Task name">
                <textarea class="modal-input modal-textarea" id="inputDescription" data-i18n="notes" placeholder="Notes" rows="2"></textarea>
                <div class="modal-row">
                    <label class="modal-label" data-i18n="deadline">Deadline</label>
                    <input type="datetime-local" class="modal-input" id="inputDeadline">
                </div>
                <div class="modal-row">
                    <label class="modal-label" data-i18n="priority">Priority</label>
                    <div class="priority-select" id="prioritySelect">
                        <button class="priority-btn" data-priority="low">!</button>
                        <button class="priority-btn active" data-priority="medium">!!</button>
                        <button class="priority-btn" data-priority="high">!!!</button>
                    </div>
                </div>
                <div class="modal-row">
                    <label class="modal-label" data-i18n="folder">Folder</label>
                    <select class="modal-input" id="inputFolder">
                        <option value="" data-i18n="none">None</option>
                        <option value="work" data-i18n="work">Work</option>
                        <option value="personal" data-i18n="personal">Personal</option>
                        <option value="study" data-i18n="study">Study</option>
                    </select>
                </div>
                <div class="modal-row">
                    <label class="modal-label" data-i18n="repeat">Repeat</label>
                    <select class="modal-input" id="inputRepeat">
                        <option value="none" data-i18n="never">Never</option>
                        <option value="daily" data-i18n="daily">Daily</option>
                        <option value="weekly" data-i18n="weekly">Weekly</option>
                        <option value="monthly" data-i18n="monthly">Monthly</option>
                    </select>
                </div>
                <div class="modal-row">
                    <label class="modal-label" data-i18n="remindBefore">Remind before</label>
                    <select class="modal-input" id="inputRemindBefore">
                        <option value="0" data-i18n="atDeadline">At deadline</option>
                        <option value="5" data-i18n="min5">5 minutes</option>
                        <option value="15" data-i18n="min15">15 minutes</option>
                        <option value="30" data-i18n="min30">30 minutes</option>
                        <option value="60" data-i18n="hour1">1 hour</option>
                        <option value="1440" data-i18n="day1">1 day</option>
                    </select>
                </div>
                <div class="modal-row">
                    <label class="modal-label" data-i18n="subtasks">Subtasks</label>
                    <div class="subtasks-list" id="subtasksList"></div>
                    <button class="add-subtask-btn" id="addSubtask" data-i18n="addSubtask">+ Add subtask</button>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-delete" id="btnDelete" style="display:none;" data-i18n="delete">Delete</button>
                <button class="btn-save" id="btnSave" data-i18n="save">Save</button>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
